name: Keep Alive

# Pings the deployed health endpoint so the Render free instance doesn't spin
# down (it sleeps after ~15 min idle). GitHub's scheduler can be delayed, so
# this is best-effort — an occasional cold start is still possible.
on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health (wakes the instance)
        run: |
          curl -sS --max-time 90 https://asmakta.onrender.com/health || true
